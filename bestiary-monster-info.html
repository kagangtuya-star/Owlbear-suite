<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>怪物信息</title>
<style>
/* No transitions / animations — instant 0-frame show/hide. */
*{margin:0;padding:0;box-sizing:border-box;transition:none!important;animation:none!important}

/* Popover stays permanently open so content toggles with 0 frames. When no
   monster is selected, the whole iframe is click-through so the DM can still
   interact with the map under the info region. */
html,body{
  height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:#eee;background:transparent;
  pointer-events:none;
}

.card{
  position:absolute;inset:0;
  background:rgba(22,33,62,0.94);
  border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  /* Card is interactive so long content can be scrolled. The popover is
     only open while a monster is selected, so the iframe never occupies
     screen space when no info is shown — click-through is automatic. */
  pointer-events:auto;
}

.root{padding:10px 14px;height:100%;overflow-y:auto}
.root::-webkit-scrollbar{width:3px}
.root::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.hdr{display:flex;align-items:center;gap:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:7px}
/* Drag grip (top-left of header). Pointer events route through
   panelDrag.ts which broadcasts to bestiary/index.ts to re-anchor. */
.drag-handle{
  flex-shrink:0;
  width:14px;height:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s;
  touch-action:none;user-select:none;
  align-self:center;
}
.drag-handle:hover{opacity:1;color:rgba(255,255,255,0.85)}
.drag-handle.is-dragging{cursor:grabbing;opacity:1;color:#5dade2}
.drag-handle svg{width:12px;height:18px;display:block;pointer-events:none}
/* Pin button — toggles "panel doesn't auto-close on deselect". */
.panel-pin-btn{
  flex-shrink:0;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;padding:0;margin:0;
  cursor:pointer;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s, transform .15s;
  border-radius:3px;
}
.panel-pin-btn:hover{opacity:1;color:rgba(255,255,255,0.85)}
.panel-pin-btn.pinned{
  opacity:1;
  color:#e94560;
  transform:rotate(-25deg);
}
.panel-pin-btn.pinned:hover{color:#ff6b81}
.panel-pin-btn svg{width:14px;height:14px;display:block;pointer-events:none}
/* 2026-05-11 — reset button. Wipes the bubbles plugin's per-token
   cache via a LOCAL broadcast, forcing a full re-render. Used when
   the on-canvas HP bar / AC shield drifts out of position. */
.reset-btn{
  flex-shrink:0;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;padding:0;margin:0;
  cursor:pointer;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s, transform .25s;
  border-radius:3px;
}
.reset-btn:hover{opacity:1;color:#f5a623}
.reset-btn:active{transform:rotate(180deg)}
.reset-btn.flash{opacity:1;color:#f5a623;transform:rotate(180deg)}
.reset-btn svg{width:13px;height:13px;display:block;pointer-events:none}
.name{font-size:15px;font-weight:700;color:#e94560;flex-shrink:0;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.name-wrap{display:flex;align-items:center;gap:5px;min-width:0;flex-shrink:0}
/* When a token is selected the name renders as a button so clicking
   it syncs/clears the token's plainText label. Same visual size as
   the static .name div; hover halo + cursor:pointer advertise click
   affordance. */
button.name.name-btn{
  appearance:none;border:none;background:transparent;
  font-family:inherit;text-align:left;padding:0;margin:0;
  cursor:pointer;
  border-radius:4px;
  transition:background .12s, color .12s, text-shadow .12s;
}
button.name.name-btn:hover{
  background:rgba(233,69,96,.16);
  color:#ffd8df;
  text-shadow:0 0 6px rgba(233,69,96,.45);
}
button.name.name-btn:active{transform:scale(0.97)}
button.name.name-btn:focus-visible{
  outline:1px dashed rgba(233,69,96,.65);outline-offset:2px;
}
button.name.name-btn:disabled{opacity:0.5;cursor:wait}
.sub{font-size:11px;color:#aaa;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Two-column top: chips (left) + six-abilities (right) */
/* === HP / Temp / AC stat banner — same pattern as cc-info ============
   HP red rounded pill, temp pink circle, AC heater shield. Writes
   patch the bound monster token's bubbles metadata which the suite's
   bubbles module reads to redraw the HP bar + heater shield. */
.stat-banner{
  display:flex;align-items:center;gap:8px;
  /* Sticky to top of the scrollable .root so HP/AC stays visible
     while the user scrolls through trait/action sections. */
  position:sticky;
  top:-10px;
  z-index:20;
  margin:0 0 8px;
  padding:6px 2px 4px;
  background:rgba(22,33,62,0.94);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
/* HP pill is now a two-layer stack: dark "track" fills the full pill
   width while a red "fill" pseudo-element is masked to current/max
   HP via the --hp-ratio CSS var. The numeric editor sits above both
   layers via z-index. Mirrors the bubbles bar's progressive fill so
   the panel reads as a HP bar AND a numeric editor. */
.hp-pill{
  flex:1;
  position:relative;
  isolation:isolate;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:2px;
  min-height:34px;
  padding:0 12px;
  background:linear-gradient(135deg,#3a1a18,#4a221d);
  border:1px solid rgba(231,76,60,0.7);
  border-radius:18px;
  color:#fff;
  font-weight:800;font-size:17px;
  box-shadow:0 2px 6px rgba(231,76,60,0.32),0 0 0 1px rgba(0,0,0,0.18) inset;
  letter-spacing:0.3px;
}
.hp-pill::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#c0392b,#e94560);
  width:calc(var(--hp-ratio, 1) * 100%);
  transition:width 0.18s ease-out;
  z-index:0;
  pointer-events:none;
}
.hp-pill > *{position:relative;z-index:1}
.hp-pill .slash{font-size:14px;font-weight:400;opacity:0.55;margin:0 1px}
.temp-pill{
  flex-shrink:0;
  width:36px;height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,#f5a3c7,#ee7eaa);
  border:1px solid rgba(232,138,174,0.75);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:13px;
  box-shadow:0 2px 6px rgba(232,138,174,0.30),0 0 0 1px rgba(0,0,0,0.18) inset;
}
.ac-pill{
  flex-shrink:0;
  width:38px;height:42px;
  background:linear-gradient(135deg,#7ec8f0,#3498db);
  border:1px solid rgba(52,152,219,0.7);
  clip-path:polygon(0% 8%,100% 8%,100% 60%,50% 100%,0% 60%);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:14px;
  padding-bottom:8px;
  filter:drop-shadow(0 2px 4px rgba(52,152,219,0.40));
}
.stat-cell{position:relative;display:flex;align-items:center;justify-content:center;cursor:text}
.hp-pill .stat-cell{flex:1;align-self:stretch}
.hp-pill .slash{pointer-events:none}
.temp-pill,.ac-pill{cursor:text}
.stat-cell .prev-hint{
  position:absolute;left:50%;bottom:calc(100% + 3px);
  transform:translateX(-50%);
  font-size:9.5px;font-weight:700;
  color:rgba(255,255,255,0.92);
  background:rgba(7,19,32,0.78);
  padding:1px 6px;
  border-radius:8px;
  pointer-events:none;
  white-space:nowrap;
  opacity:0;
  transition:opacity .12s, transform .12s;
  z-index:20;
  letter-spacing:0.3px;
}
.stat-cell.editing .prev-hint{opacity:1;transform:translateX(-50%) translateY(-2px)}
.stat-input{
  background:transparent;border:none;
  color:inherit;
  font-family:inherit;font-weight:inherit;font-size:inherit;
  text-align:center;
  outline:none;padding:0;
  font-variant-numeric:tabular-nums;
  width:100%;height:100%;
  cursor:text;
  caret-color:rgba(255,255,255,0.9);
}
.stat-input:focus{
  text-decoration:underline;
  text-decoration-color:rgba(255,255,255,0.65);
  text-decoration-thickness:1px;
  text-underline-offset:2px;
}

/* Lock button — same pattern as cc-info. Bestiary popover is
   GM-only so it's always rendered. */
.stat-lock{
  flex-shrink:0;
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(190,24,24,0.38);
  border:1px solid rgba(248,113,113,0.95);
  border-radius:7px;
  cursor:pointer;
  color:#fecaca;
  box-shadow:0 0 0 2px rgba(127,29,29,0.28),0 0 12px rgba(248,113,113,0.35);
  margin-left:auto;
  padding:0;
  transition:filter .12s, background .12s, border-color .12s, color .12s;
}
.stat-lock:hover{filter:brightness(1.18)}
.stat-lock[data-locked="false"]{
  background:transparent;
  border-color:transparent;
  color:rgba(255,255,255,0.48);
  box-shadow:none;
}
.stat-lock[data-locked="false"] .lock-shackle{
  d:path("M5 7 V5 a3 3 0 0 1 6 0");
}
.top{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:7px}
.chips{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;align-content:start;align-self:start}
.chip{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:4px;padding:3px 5px;text-align:center;
}
.chip .k{font-size:9px;color:#888;letter-spacing:.3px;display:block;line-height:1.2}
.chip .v{font-size:12px;font-weight:700;color:#eee;line-height:1.3}
.chip.hp .v{color:#e94560}
.chip.ac .v{color:#3498db}
.chip.cr .v{color:#f5a623}
/* Speed: smaller font (~50% of a normal chip value) and one line per type. */
.chip.speed .v{font-size:9px;line-height:1.25;font-weight:600}
.chip.speed .v div{display:block}

/* Detail meta block — rows of "label: value" between abilities and
   actions. Empty rows are filtered out by the renderer so the block
   only shows for monsters with actual data; missing fields don't
   leave dead space. */
.meta{
  display:flex;flex-direction:column;gap:2px;
  margin:0 0 8px;
  padding:6px 9px 7px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:5px;
  font-size:11px;line-height:1.55;
}
.meta-row{display:flex;align-items:flex-start;gap:6px}
.meta-l{
  flex-shrink:0;
  min-width:42px;
  color:#9aa0b3;font-weight:700;
  letter-spacing:0.3px;
  font-size:10.5px;
}
.meta-v{flex:1;color:#d8dce8}
/* Skill rollable inside the meta block — slightly tighter padding so
   the inline 、 separators don't break the line, and a subtle dotted
   underline so players know it's clickable even before hover. */
.meta-v .skill-roll{
  padding:0 2px;
  text-underline-offset:2px;
  text-decoration: underline dotted rgba(127,195,235,0.45);
}
.meta-v .skill-roll:hover{
  text-decoration: underline solid rgba(127,195,235,0.85);
}

.abil{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;align-content:start}
.abl{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:4px;padding:3px 5px;
  display:flex;align-items:center;gap:4px;
}
.abl .a{font-size:9px;color:#888;font-weight:700;letter-spacing:.5px;width:14px}
.abl .t{font-size:11px;color:#bbb;min-width:16px}
.abl .m{margin-left:auto;font-size:11.5px;color:#f5a623;font-weight:700}
.abl.prof{background:rgba(245,166,35,0.14);border-color:rgba(245,166,35,0.55)}
.abl.prof .a{color:#f5a623}
.abl.prof .t{color:#fce6bd}

.sect{font-size:10px;color:#5dade2;letter-spacing:.6px;margin:5px 0 3px;font-weight:600}

.act{padding:4px 6px;margin-bottom:3px;background:rgba(255,255,255,0.035);border-radius:4px;font-size:10.5px;line-height:1.4}
.act .n{color:#f5a623;font-weight:700;margin-right:4px}
.act .t{color:#ccc}
.act.bonus .n{color:#2ecc71}
.act.reaction .n{color:#3498db}
.act.legendary .n{color:#d8b4ff}
.act.trait .n{color:#aaa}
.act.spell{background:rgba(93,173,226,0.08);border:1px solid rgba(93,173,226,0.2)}
.act.spell .n{color:#5dade2}
.act.spell .sc-hdr{margin-bottom:2px}
.spell-line{font-size:10px;color:#ccc;line-height:1.45;margin-top:2px}
.spell-line .sl{color:#5dade2;font-weight:600;margin-right:5px}
.preamble{font-size:10px;color:#aaa;font-style:italic;padding:3px 6px;margin-bottom:4px;line-height:1.45;border-left:2px solid rgba(216,180,255,0.4);background:rgba(216,180,255,0.05)}

.empty{color:#888;font-size:11px;padding:3px 6px}
.err{color:#e74c3c;padding:12px;text-align:center;font-size:11px}

/* Rollable tags inside monster stat-block (attack hits, damage dice,
   chance rolls). Click → fires a quick-roll on the selected token. */
.rollable{
  cursor:pointer;
  color:#7fc3eb;
  font-weight:600;
  border-radius:3px;
  padding:0 3px;
  transition:background .12s, color .12s;
}
.rollable:hover{
  background:rgba(93,173,226,0.20);
  color:#bfe2f5;
}
.rollable.rollable-flash{
  animation: bestRollFlash 0.4s ease-out;
}
@keyframes bestRollFlash{
  0%   {background:rgba(93,173,226,0.55); transform:scale(1.18); display:inline-block}
  100% {background:transparent; transform:scale(1)}
}

/* Spell-name chip — clicking broadcasts BC_SEARCH_QUERY so the
   global search popup opens pre-filled with this spell. Subtle
   purple tint to distinguish from the bluer .rollable dice spans. */
.spell-chip{
  cursor:pointer;
  color:#c8a2e0;
  border-radius:3px;
  padding:0 2px;
  transition:background .12s, color .12s;
}
.spell-chip:hover{
  background:rgba(155,109,213,0.22);
  color:#e0c8ee;
}
.spell-chip.spell-chip-flash{
  animation: bestSpellFlash 0.4s ease-out;
}
@keyframes bestSpellFlash{
  0%   {background:rgba(155,109,213,0.55); transform:scale(1.12); display:inline-block}
  100% {background:transparent; transform:scale(1)}
}

/* Resource-tracker tab strip — sits BELOW the stat-banner (HP / AC),
   ABOVE the attribute / resource content panes. The strip itself is
   transparent (no margin / border / fill) so it visually flows into
   the panel background; only the buttons themselves carry weight,
   and a sliding indicator translates smoothly between them on hover. */
.rt-tabstrip{
  position:relative;
  display:flex; gap:0;
  padding:0; margin:0;
  background:transparent; border:none;
  /* A subtle top + bottom hairline blends it with the surrounding
     content without making the strip feel like a discrete container. */
  border-top:1px solid rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.rt-tabstrip .rt-tab{
  flex:1; height:30px;
  background:transparent; border:none;
  color:#9aa0b3; font-size:11.5px; font-weight:600;
  cursor:pointer;
  font-family:inherit;
  user-select:none;
  position:relative; z-index:1;
  transition:color .18s ease;
}
.rt-tabstrip .rt-tab:hover,
.rt-tabstrip .rt-tab.on{ color:#e6e8ee }
/* Sliding focus indicator — a single absolutely-positioned bar that
   translates between buttons in 220ms cubic-bezier. Width / left
   are set inline by setupTabSwitching() based on the current
   button's bounding rect. */
.rt-tab-indicator{
  position:absolute;
  bottom:0; left:0;
  height:30px;
  width:0; /* set inline */
  background:rgba(93,173,226,0.14);
  border-bottom:2px solid #5dade2;
  border-radius:4px 4px 0 0;
  /* !important needed: a global * { transition:none!important } reset
     up top kills every transition by default (was added to suppress
     OBR's default popover-zoom). The slide-tab specific rules need
     to win against that. Same trick on .rt-clip and .rt-pane below. */
  transition:transform .1s ease-out, width .1s ease-out !important;
  pointer-events:none;
  z-index:0;
}
/* Sliding clip: panes are stacked, only one visible at a time, the
   active one translated to translateX(0). The transition triggers
   a smooth horizontal swipe between attr ↔ res. The clip's height
   is JS-driven (matches the active pane's offsetHeight) so it
   collapses / grows in lock-step with content. */
.rt-clip{
  position:relative;
  overflow:hidden;
  width:100%;
  /* 2026-05-11 — speed bump 0.35 → 0.1s + `contain` to keep the
     pane's transform from triggering width re-flow on adjacent
     siblings (user reported "其他组件被突兀拉长/缩短" during the
     slide). `contain: layout paint` isolates the clip's internal
     layout from the rest of the document so an in-flight pane
     translate can't ripple outward through bounding-box math. */
  contain:layout paint;
  transition:height .1s ease-out !important;
}
.rt-pane{
  position:absolute;
  top:0; left:0;
  width:100%;
  transition:transform .1s ease-out, opacity .1s ease-out !important;
}
/* Default: attr is on the LEFT (visible at translateX(0) when active);
   res sits OFF-SCREEN on the right at translateX(100%). */
.rt-clip[data-active="attr"] .rt-pane[data-pane="attr"]{ transform:translateX(0); opacity:1 }
.rt-clip[data-active="attr"] .rt-pane[data-pane="res"]{  transform:translateX(100%); opacity:.4 }
.rt-clip[data-active="res"]  .rt-pane[data-pane="attr"]{ transform:translateX(-100%); opacity:.4 }
.rt-clip[data-active="res"]  .rt-pane[data-pane="res"]{  transform:translateX(0); opacity:1 }
</style>
</head>
<body>
<div class="card"><div class="root" id="root"></div></div>
<script type="module" src="/src/modules/bestiary/monster-info-page.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>资源追踪 · 全员总览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#14182a; --bg2:#1c2238; --bg3:#262d4a;
  --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.20);
  --text:#e6e8ee; --text-dim:#9aa0b3; --text-mute:#5a6075;
  --accent:#5dade2; --accent-dim:#7ec8f0; --green:#2ecc71; --red:#e74c3c; --gold:#f5a623;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--text)}
html{background:transparent}
body{background:rgba(10,12,22,0.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

.rt-panel{display:flex;flex-direction:column;height:100%}

/* ===== Header ===== */
.rt-head{
  display:flex;align-items:center;gap:12px;
  padding:12px 18px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.rt-title{font-size:15px;font-weight:800;letter-spacing:0.3px;flex-shrink:0}
.rt-sub{font-size:11.5px;color:var(--text-mute);flex:1;min-width:0}
.rt-close{
  width:30px;height:30px;flex-shrink:0;
  background:transparent;border:1px solid var(--border-strong);
  color:var(--text-dim);border-radius:6px;cursor:pointer;
  font-size:18px;line-height:1;font-family:inherit;
}
.rt-close:hover{background:rgba(231,76,60,0.18);border-color:var(--red);color:#fff}

/* ===== Body — the single scroll region ===== */
/* 2026-05-16 — explicit `grid-auto-rows: max-content` + `align-items:
   start` so each row sizes to its tallest card's natural content,
   shorter cards align to row top (no forced stretch). Without these,
   when there were many characters the rows would all share a single
   tall row height and shorter cards looked squashed at the top with
   weird whitespace; users with many resources saw later resources
   clipped because `align-items:stretch` (default) plus
   `overflow:hidden` on .rt-char silently truncated overflow. */
.rt-body{
  flex:1;min-height:0;overflow-y:auto;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  grid-auto-rows:max-content;
  gap:14px;
  align-items:start;
  align-content:start;
}
.rt-body::-webkit-scrollbar{width:8px}
.rt-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

.rt-empty{
  grid-column:1/-1;
  text-align:center;color:var(--text-mute);
  font-size:13px;line-height:1.9;padding:60px 20px;
}

/* ===== Character card ===== */
.rt-char{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:10px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.rt-char-head{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;
  background:var(--bg3);
  border-bottom:1px solid var(--border);
}
.rt-char-name{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.rt-char-owner{
  font-size:10px;color:var(--accent-dim);
  background:rgba(93,173,226,0.14);
  border:1px solid rgba(93,173,226,0.3);
  border-radius:999px;padding:2px 8px;flex-shrink:0;
  white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;
}
/* Stat banner + resource section — both mount the same components the
   character-card info popover uses (mountStatBanner + mountResourcePanel),
   which inject their own CSS at runtime. These mount divs just give the
   components a little padding inside the card. */
.rt-stat-mount{padding:6px 10px 0}
.rt-res-mount{padding:4px 8px 8px}

/* ===== Presets bar (2026-05-15) — bundle-presets that snapshot a
   character's full resource list. Click a chip = action menu
   (overwrite-all / merge-all / rename / delete). Drag a chip = drop
   onto a character card to apply just to that one. ===== */
.rt-presets-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:5px;
  padding:7px 18px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.rt-presets-lbl{
  font-size:10px;color:var(--text-dim);letter-spacing:0.6px;
  font-weight:700;text-transform:uppercase;padding-right:4px;
}
.rt-presets-empty{
  font-size:10.5px;color:var(--text-mute);letter-spacing:0.2px;flex:1;
}
.rt-preset-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 5px 3px 9px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:0;
  font-size:11px;color:var(--text);font-family:inherit;
  cursor:pointer;user-select:none;
  transition:background .12s,border-color .12s,color .12s;
}
.rt-preset-chip:hover{
  background:rgba(93,173,226,0.16);
  border-color:rgba(93,173,226,0.42);
}
.rt-preset-chip .pre-count{
  font-size:9.5px;color:var(--text-dim);
  font-family:ui-monospace,Consolas,monospace;
  padding:0 4px;background:rgba(255,255,255,0.06);
}
.rt-preset-actions{margin-left:auto;display:flex;gap:5px}
.rt-preset-actions button{
  background:rgba(46,204,113,0.16);
  border:1px solid rgba(46,204,113,0.40);
  color:#7be0a0;font-size:10.5px;font-family:inherit;font-weight:700;
  padding:3px 9px;cursor:pointer;border-radius:0;
  transition:background .12s,color .12s;
}
.rt-preset-actions button:hover{
  background:rgba(46,204,113,0.28);color:#a8efb8;
}
.rt-preset-actions button.io{
  background:transparent;
  border:1px solid var(--border-strong);
  color:var(--text-dim);
}
.rt-preset-actions button.io:hover{
  background:rgba(255,255,255,0.06);color:var(--text);
}
.rt-preset-menu{
  position:absolute;z-index:30;
  background:var(--bg2);
  border:1px solid var(--border-strong);
  box-shadow:0 8px 24px rgba(0,0,0,0.55);
  display:flex;flex-direction:column;
  min-width:200px;
  font-size:11.5px;
}
.rt-preset-menu button{
  background:transparent;border:none;color:var(--text);
  font-family:inherit;font-size:11.5px;font-weight:600;
  padding:8px 14px;text-align:left;cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .12s,color .12s;
}
.rt-preset-menu button:last-child{border-bottom:none}
.rt-preset-menu button:hover{background:rgba(93,173,226,0.20);color:var(--accent-dim)}
.rt-preset-menu button.danger:hover{background:rgba(231,76,60,.20);color:#ff7a6b}

/* Per-card "save as preset" button — shows in each character card's
   head row, only visible on hover so it doesn't clutter the panel. */
.rt-char-save-preset{
  flex-shrink:0;font-size:10px;color:var(--text-dim);
  background:transparent;border:1px solid transparent;
  border-radius:0;padding:2px 7px;cursor:pointer;
  font-family:inherit;
  opacity:0;transition:opacity .12s, background .12s, color .12s, border-color .12s;
}
.rt-char:hover .rt-char-save-preset{opacity:1}
.rt-char-save-preset:hover{
  background:rgba(46,204,113,0.18);
  border-color:rgba(46,204,113,0.45);
  color:#7be0a0;
}

/* Drop-target highlight while a preset chip is being dragged over
   a character card. */
.rt-char.drop-target{
  border-color:var(--green);
  box-shadow:0 0 0 1px var(--green), 0 0 12px rgba(46,204,113,0.35);
}

/* Hidden file input for JSON import. */
.rt-file-import{display:none}
</style>
</head>
<body>
<div class="rt-panel">
  <header class="rt-head">
    <span class="rt-title">
      <svg viewBox="0 0 16 16" width="15" height="15" style="vertical-align:-3px;margin-right:6px" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="12" height="12" rx="1.5"/>
        <path d="M5 11L5 7M8 11L8 4M11 11L11 9"/>
      </svg>资源追踪
    </span>
    <span class="rt-sub" id="rtSub">全员资源总览</span>
    <button class="rt-close" id="rtClose" type="button" title="关闭">×</button>
  </header>
  <div class="rt-presets-bar" id="rtPresetsBar">
    <span class="rt-presets-lbl">预设</span>
    <span class="rt-presets-empty" id="rtPresetsEmpty">还没有预设。鼠标移到某张角色卡上点「+ 存为预设」可保存其当前资源；保存后这里出现的 chip：<b>点击</b>=覆盖/叠加给全员、<b>拖到角色卡上</b>=只给那一张。</span>
    <span id="rtPresetsList" style="display:inline-flex;flex-wrap:wrap;gap:4px"></span>
    <span class="rt-preset-actions">
      <button class="io" id="rtPresetExport" type="button" title="导出全部预设为 JSON">导出</button>
      <button class="io" id="rtPresetImport" type="button" title="导入预设 JSON">导入</button>
      <input type="file" id="rtPresetFile" class="rt-file-import" accept=".json,application/json">
    </span>
  </div>
  <div class="rt-body" id="rtBody"></div>
</div>
<script type="module" src="/src/resource-tracker-page.ts"></script>
</body>
</html>

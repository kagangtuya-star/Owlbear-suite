<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>编辑资源</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#292d3c;--bg-strong:#1f2230;--bg-card:#323748;
  --border:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.22);
  --text:#e6e8ee;--text-dim:#9aa0b3;
  --accent:#5dade2;--accent-warm:#f5a623;--accent-red:#e74c3c;--accent-green:#2ecc71;
}
html,body{
  height:100%;width:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:var(--text);background:rgba(0,0,0,0.55);
  font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
.card{
  width:min(420px, 92vw);
  max-height:90vh;
  background:var(--bg);
  border:1px solid var(--border-strong);
  border-radius:10px;
  box-shadow:0 12px 36px rgba(0,0,0,0.55);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.hdr{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hdr .ttl{font-size:14px;font-weight:700;flex:1;letter-spacing:0.2px}
.hdr .x{
  cursor:pointer;font-size:18px;color:var(--text-dim);line-height:1;padding:0 4px;
  background:none;border:none;transition:color .12s;
}
.hdr .x:hover{color:var(--text)}

.body{
  flex:1;min-height:0;overflow-y:auto;
  padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

label.field{
  display:flex;flex-direction:column;gap:4px;
  font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;font-weight:700;
}
.field input[type=text],
.field input[type=number],
.field select{
  height:30px;padding:0 10px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);font-size:13px;outline:none;
  font-family:inherit;
  transition:border-color .12s, box-shadow .12s;
}
.field input:focus,.field select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(93,173,226,0.30);
}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* 2026-05-11 — type selector toggle (replaces a <select> dropdown).
   Mirrors the cluster's CN|EN switch pattern: 3 segments, click to
   pick, accent-tinted active state. */
.type-toggle{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  height:30px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
}
.type-toggle button{
  background:transparent;border:none;
  color:var(--text-dim);
  font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;
  letter-spacing:0.4px;
  transition:background .12s, color .12s;
}
.type-toggle button:hover{color:var(--text)}
.type-toggle button.on{
  background:rgba(93,173,226,0.22);
  color:#7ec8f0;
}
.type-toggle button + button{border-left:1px solid var(--border)}

.icon-label{
  font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;font-weight:700;
  margin-top:2px;
}
.icon-grid{
  display:grid;grid-template-columns:repeat(8, 1fr);gap:4px;
  max-height:200px;overflow-y:auto;
  padding:6px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:6px;
}
.icon-grid::-webkit-scrollbar{width:6px}
.icon-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:3px}
.icon-pick{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  border-radius:5px;cursor:pointer;
  border:1px solid transparent;
  transition:background .12s, border-color .12s, transform .12s;
}
.icon-pick:hover{
  background:rgba(255,255,255,0.08);
  transform:scale(1.06);
}
.icon-pick.on{
  background:rgba(93,173,226,0.20);
  border-color:var(--accent);
}
.icon-pick svg{width:24px;height:24px;pointer-events:none}
.icon-name{font-size:10px;color:var(--text-dim);text-align:center}

.btn-row{
  display:flex;gap:6px;
  padding:12px 16px;
  border-top:1px solid var(--border);
  flex-shrink:0;
  align-items:center;
}
.btn{
  height:30px;padding:0 14px;border-radius:6px;
  background:var(--bg-card);color:var(--text);
  border:1px solid var(--border);font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:600;
  transition:background .12s, border-color .12s, color .12s;
}
.btn:hover{background:rgba(93,173,226,0.15);border-color:rgba(93,173,226,0.35);color:#7ec8f0}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4a99ce;border-color:#4a99ce}
.btn.danger:hover{background:rgba(231,76,60,.18);border-color:rgba(231,76,60,.5);color:#ff7a6b}

.preview-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:6px;
}
.preview-icon{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
}
.preview-icon svg{width:28px;height:28px}
.preview-label{flex:1;font-size:11px;color:var(--text-dim)}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <span class="ttl" id="title">编辑资源</span>
    <button class="x" id="btnX" type="button">×</button>
  </div>
  <div class="body">
    <label class="field">
      <span>名字</span>
      <input type="text" id="name" maxlength="32" placeholder="如：一环法术槽" />
    </label>

    <div class="field">
      <span>类型</span>
      <div class="type-toggle" id="typeToggle">
        <button type="button" data-type="count"  class="on">个数</button>
        <button type="button" data-type="bar">进度</button>
        <button type="button" data-type="number">数字</button>
      </div>
    </div>

    <div class="row-2">
      <label class="field">
        <span>当前</span>
        <input type="number" id="current" step="1" />
      </label>
      <label class="field">
        <span>最大</span>
        <input type="number" id="max" step="1" min="0" />
      </label>
    </div>

    <div class="icon-label">图标</div>
    <div class="icon-grid" id="iconGrid"></div>

    <div class="preview-row" id="preview">
      <span class="preview-icon" id="previewIcon"></span>
      <span class="preview-label" id="previewLabel">预览</span>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn danger" id="btnDelete" type="button" style="display:none">删除</button>
    <span style="flex:1"></span>
    <button class="btn" id="btnCancel" type="button">取消</button>
    <button class="btn primary" id="btnSave" type="button">保存</button>
  </div>
</div>
<script type="module" src="/src/modules/resourceTracker/edit-page.ts"></script>
</body>
</html>

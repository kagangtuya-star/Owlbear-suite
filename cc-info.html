<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>角色卡信息</title>
<style>
/* No transitions / animations anywhere — user wants instant 0-frame show/hide. */
*{margin:0;padding:0;box-sizing:border-box;transition:none!important;animation:none!important}

/* Popover is only open while a bound character is selected, so the iframe
   never occupies screen space when no card is shown — the block-clicks
   problem is avoided entirely by simply not existing. */
html,body{
  height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:#eee;background:transparent;
}

.card{
  position:absolute;inset:0;
  background:rgba(22,33,62,0.94);
  border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
/* Drag grip — sits inline inside .hdr before the character name.
   Participates in the flex header layout. */
.drag-handle{
  flex-shrink:0;
  width:14px;height:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s;
  touch-action:none;user-select:none;
}
.drag-handle:hover{opacity:1;color:rgba(255,255,255,0.85)}
.drag-handle.is-dragging{cursor:grabbing;opacity:1;color:#5dade2}
.drag-handle svg{width:12px;height:18px;display:block;pointer-events:none}
/* Pin button — toggles "panel doesn't auto-close on deselect". */
.panel-pin-btn{
  flex-shrink:0;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;padding:0;margin:0;
  cursor:pointer;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s, transform .15s;
  border-radius:3px;
}
.panel-pin-btn:hover{opacity:1;color:rgba(255,255,255,0.85)}
.panel-pin-btn.pinned{
  opacity:1;
  color:#f5a623;
  transform:rotate(-25deg);
}
.panel-pin-btn.pinned:hover{color:#ffc857}
.panel-pin-btn svg{width:14px;height:14px;display:block;pointer-events:none}
/* 2026-05-11 — reset button (mirror of monster-info). LOCAL broadcast
   tells the bubbles bg to drop the cached entry for the bound token
   and re-render. Fixes occasional "blood bar drifted off-anchor". */
.reset-btn{
  flex-shrink:0;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;padding:0;margin:0;
  cursor:pointer;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s, transform .25s;
  border-radius:3px;
}
.reset-btn:hover{opacity:1;color:#f5a623}
.reset-btn:active{transform:rotate(180deg)}
.reset-btn.flash{opacity:1;color:#f5a623;transform:rotate(180deg)}
.reset-btn svg{width:13px;height:13px;display:block;pointer-events:none}
/* 2026-05-12 — scrollbar hidden (still scrollable via wheel/touch).
   The 3px scrollbar was causing width jumps on tab switch that
   stretched sibling components. */
.root{
  padding:10px 12px;height:100%;overflow-y:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
  /* 2026-05-16 — `--panel-zoom` set live by info-page.ts based on the
     iframe's current height vs the 260 px design baseline. Chrome
     CSS `zoom` scales all descendants — text, spacing, click targets —
     as a unit so a manually-resized larger popover gets visibly
     larger text. */
  zoom:var(--panel-zoom, 1);
}
.root::-webkit-scrollbar{display:none;width:0;height:0}

.hdr{display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:7px}
.name{font-size:14px;font-weight:700;color:#f5a623;flex-shrink:0;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.name-wrap{display:flex;align-items:center;gap:5px;min-width:0;flex-shrink:0}
/* When the card is bound to a scene token, the name renders as a
   button so clicking it syncs/clears the token's plainText label.
   Keeps the same visual size as the static .name div but adds a
   subtle hover halo + cursor: pointer to advertise click affordance. */
button.name.name-btn{
  appearance:none;border:none;background:transparent;
  font-family:inherit;text-align:left;padding:0;margin:0;
  cursor:pointer;
  border-radius:4px;
  transition:background .12s, color .12s, text-shadow .12s;
}
button.name.name-btn:hover{
  background:rgba(245,166,35,.14);
  color:#ffd27a;
  text-shadow:0 0 6px rgba(245,166,35,.45);
}
button.name.name-btn:active{transform:scale(0.97)}
button.name.name-btn:focus-visible{
  outline:1px dashed rgba(245,166,35,.65);outline-offset:2px;
}
button.name.name-btn:disabled{opacity:0.5;cursor:wait}
.sub{font-size:10.5px;color:#aaa;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.raw-link{
  flex-shrink:0;font-size:10px;font-weight:600;letter-spacing:.3px;
  color:#5dade2;text-decoration:none;
  padding:2px 7px;border:1px solid rgba(93,173,226,.4);border-radius:10px;
  background:rgba(52,152,219,.1);white-space:nowrap;
}
.raw-link:hover{background:rgba(52,152,219,.25);color:#fff}

/* === HP / Temp / AC stat banner host ========================
   The banner itself (.stat-banner + its hp-pill / temp-pill /
   ac-pill / stat-input / stat-lock children) is the shared
   `mountStatBanner` component — the SAME one the standalone DM
   resource tracker mounts. It injects ALL of its own CSS at
   runtime (src/utils/statBanner.ts), so cc-info no longer carries
   a copy — this used to be ~175 lines of byte-identical duplicate.
   This host element only carries the cc-info-specific chrome:
   sticky-to-scroll-top + the opaque wash that keeps scrolling
   content from showing through the translucent card backdrop. */
.cc-stat-mount{
  /* Sticky to the top of the scrollable .root container. The card
     has a translucent backdrop, so we paint our own opaque-enough
     background here to keep scrolling content from showing through
     the pill / shield artwork. */
  position:sticky;
  top:-10px;          /* tuck under the .root padding so the rounded
                         pill's shadow stops bleeding above the
                         viewport edge while the user scrolls */
  z-index:20;
  margin:0 0 8px;
  background:rgba(22,33,62,0.94);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:6px}
.chip{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:4px;padding:3px 4px;text-align:center;
}
.chip .k{font-size:8.5px;color:#888;letter-spacing:.3px;display:block;line-height:1.2}
.chip .v{font-size:12px;font-weight:700;color:#eee;line-height:1.25}
.chip.hp .v{color:#e94560}
.chip.ac .v{color:#3498db}
.chip.init .v{color:#2ecc71}

/* align-items: stretch (grid default) makes the 3 cards in each row share
   the same height — STR/CON/CHA grow to match DEX/WIS so the layout no
   longer looks ragged with short cards beside tall ones. */
.abil{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:6px;align-items:stretch}
.abl{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:4px;padding:3px 5px;
  display:flex;flex-direction:column;
}
.abl-head{display:flex;align-items:center;gap:4px}
.abl-head .a{font-size:9px;color:#888;font-weight:700;letter-spacing:.5px;width:14px}
.abl-head .t{font-size:11px;color:#bbb;min-width:16px}
.abl-head .m{margin-left:auto;font-size:11.5px;color:#f5a623;font-weight:700}
.abl.prof{
  background:rgba(245,166,35,0.14);
  border-color:rgba(245,166,35,0.55);
}
.abl.prof .abl-head .a{color:#f5a623}
.abl.prof .abl-head .t{color:#fce6bd}

/* Skills embedded inside each ability card — 2 columns of small chips.
   Width per chip is wide enough for "运动 +5" / "调查 +2" etc. */
.abl-skills{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px 4px;
  margin-top:3px;padding-top:3px;
  border-top:1px solid rgba(255,255,255,0.06);
  flex:1;align-content:start;
}
.abl .sk{
  display:flex;align-items:baseline;gap:3px;
  padding:0 2px;
  font-size:9.5px;line-height:1.4;
  border-radius:2px;
}
.abl .sk .sk-n{color:#888;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.abl .sk .sk-v{color:#888;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.abl .sk.sk-prof{background:rgba(245,166,35,0.10)}
.abl .sk.sk-prof .sk-n{color:#fce6bd}
.abl .sk.sk-prof .sk-v{color:#f5a623}
.abl .sk.sk-exp{background:rgba(46,204,113,0.12)}
.abl .sk.sk-exp .sk-n{color:#abf3c7}
.abl .sk.sk-exp .sk-v{color:#2ecc71}

.sect{font-size:9.5px;color:#5dade2;letter-spacing:.6px;margin:5px 0 3px;font-weight:600}

.wp{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:6px;align-items:baseline;
  padding:3px 6px;
  background:rgba(255,255,255,0.035);
  border-radius:4px;
  margin-bottom:2px;
  font-size:11px;
}
.wp.spell{background:rgba(155,89,182,0.14);border:1px solid rgba(155,89,182,0.35)}
.wp.spell .n{color:#d8b4ff}
.wp .n{color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.wp .atk{color:#2ecc71;font-weight:700;font-variant-numeric:tabular-nums}
.wp .dmg{color:#ccc;font-variant-numeric:tabular-nums}
.wp .prop{grid-column:1/-1;font-size:9.5px;color:#888;margin-top:-1px;line-height:1.3}
/* Property chips — split out of the comma-separated string so each
   tag is its own clickable pill. Click → fires BC_SEARCH_QUERY so
   the cluster's global-search popover opens with the tag pre-filled
   (the user can read the rule definition without leaving OBR). */
.wp .prop-row{
  grid-column:1/-1;
  display:flex;flex-wrap:wrap;gap:3px;
  margin-top:1px;
  font-size:0;
}
.wp .prop-chip{
  display:inline-block;
  padding:1px 6px;
  font-size:9.5px;line-height:1.4;
  background:rgba(93,173,226,0.10);
  border:1px solid rgba(93,173,226,0.28);
  border-radius:8px;
  color:#9ad9ff;
  cursor:pointer;
  transition:background .12s, border-color .12s, color .12s;
}
.wp .prop-chip:hover{
  background:rgba(93,173,226,0.22);
  border-color:rgba(93,173,226,0.55);
  color:#cfeaff;
}
.wp .prop-chip.prop-mastery{
  background:rgba(245,166,35,0.12);
  border-color:rgba(245,166,35,0.40);
  color:#f5d076;
}
.wp .prop-chip.prop-mastery em{
  font-style:normal;font-size:8px;font-weight:700;
  margin-right:3px;letter-spacing:0.3px;
  color:rgba(245,166,35,0.85);
}
.wp .prop-chip.prop-mastery:hover{
  background:rgba(245,166,35,0.22);
  border-color:rgba(245,166,35,0.65);
}

.empty{color:#888;font-size:11px;padding:3px 6px}
.err{color:#e74c3c;padding:12px;text-align:center;font-size:11px}
.loading{color:#888;padding:20px;text-align:center;font-size:11px}

/* Rollable elements — abilities (modifier badge), skills, weapons.
   Subtle hint that they're clickable. Flash on click for instant
   feedback (the actual roll then plays out via the dice modal). */
.rollable{
  cursor:pointer;
  transition:background .12s, color .12s, transform .08s;
  border-radius:3px;
}
.rollable:hover{
  background:rgba(93,173,226,0.18);
  color:#9bd0f0 !important;
}
.rollable:active{transform:scale(0.96)}
.rollable.rollable-flash{
  animation: rollFlash 0.4s ease-out;
}
@keyframes rollFlash{
  0%   {background:rgba(93,173,226,0.55); transform:scale(1.18)}
  100% {background:transparent; transform:scale(1)}
}
/* Skill rows — they're already display:flex so we just give the
   hover a more pronounced background. */
.abl .sk.rollable{cursor:pointer}
.abl .sk.rollable:hover{background:rgba(93,173,226,0.18)}
.wp .rollable{padding:0 2px}

/* === Spells section (bottom of card) ===
   Compact per-level blocks. Each spell row = name + optional [Hit]
   button (1d20+atk) + optional [Damage] button (first NdM dice
   expression in description). Buttons show their value text. */
.sp-block{margin-bottom:6px}
.sp-lvl{
  font-size:9.5px;font-weight:700;color:#9ab;
  letter-spacing:0.5px;
  padding:2px 6px;
  background:rgba(255,255,255,0.04);
  border-left:2px solid rgba(155,89,182,0.55);
  border-radius:0 4px 4px 0;
  margin-bottom:3px;
  display:flex;align-items:center;justify-content:space-between;
}
.sp-lvl .sp-slot{
  font-family:ui-monospace,monospace;
  font-size:9.5px;font-weight:700;color:#cda9e8;
  background:rgba(155,89,182,0.18);
  padding:0 5px;border-radius:3px;
}
.sp-items{
  display:flex;flex-direction:column;gap:2px;
}
.sp-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:6px;align-items:center;
  padding:3px 6px;
  background:rgba(255,255,255,0.025);
  border-radius:4px;
  font-size:11px;
  min-height:22px;
}
.sp-row:hover{background:rgba(255,255,255,0.05)}
.sp-row .sp-name{
  color:#eee;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}
.sp-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:36px;
  font-family:ui-monospace,monospace;
  font-size:10.5px;font-weight:800;
  padding:2px 7px;
  border-radius:4px;
  cursor:pointer;
  flex-shrink:0;
  transition:background .12s, color .12s, transform .08s;
  letter-spacing:0.2px;
}
.sp-btn.sp-hit{
  color:#9be0a8;
  background:rgba(46,204,113,0.16);
  border:1px solid rgba(46,204,113,0.4);
}
.sp-btn.sp-hit:hover{background:rgba(46,204,113,0.28); color:#d2f5dd}
.sp-btn.sp-dmg{
  color:#ffb088;
  background:rgba(255,140,80,0.14);
  border:1px solid rgba(255,140,80,0.4);
}
.sp-btn.sp-dmg:hover{background:rgba(255,140,80,0.28); color:#ffd6c0}
.sp-btn:active{transform:scale(0.94)}
.sp-btn.rollable-flash{
  animation: rollFlash 0.4s ease-out;
}

/* === Searchable chips (特性/专长/法术) ===
   Tight name-only chips at the bottom of the card. Click → fills the
   cluster's search input so the 5etools popover opens with results.
   Layout-light: very compact, grid-wraps to as many lines as needed. */
.srch-sect{margin-top:6px}
.srch-sect-h{
  font-size:9.5px;font-weight:700;color:#9ab;
  letter-spacing:0.5px;
  padding:2px 6px;
  background:rgba(255,255,255,0.04);
  border-left:2px solid rgba(93,173,226,0.55);
  border-radius:0 4px 4px 0;
  margin-bottom:3px;
}
.srch-grid{
  display:flex;flex-wrap:wrap;gap:3px;
  padding:0 2px;
}
.srch-chip{
  display:inline-block;
  padding:1px 6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:3px;
  font-size:10px;line-height:1.4;font-weight:600;
  color:#cdd2e0;
  cursor:pointer;
  transition:background .12s, color .12s, border-color .12s, transform .08s;
  white-space:nowrap;
  max-width:160px;
  overflow:hidden;text-overflow:ellipsis;
}
.srch-chip:hover{
  background:rgba(93,173,226,0.18);
  border-color:rgba(93,173,226,0.5);
  color:#bfe2f5;
}
.srch-chip:active{transform:scale(0.96)}
.srch-chip.srch-flash{animation:srchFlash 0.4s ease-out}
@keyframes srchFlash{
  0%   {background:rgba(93,173,226,0.55); transform:scale(1.10)}
  100% {background:rgba(255,255,255,0.06); transform:scale(1)}
}

/* Resource-tracker tab strip — sticky to top of the scrollable .root,
   2026-05-12, just below the also-sticky stat-banner. */
.rt-tabstrip{
  position:sticky;
  top:36px;          /* stat-banner height */
  z-index:19;
  background:rgba(31,33,48,0.94);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex; gap:0;
  padding:0; margin:0 -2px 0;
  border-top:1px solid rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.rt-tabstrip .rt-tab{
  flex:1; height:30px;
  background:transparent; border:none;
  color:#9aa0b3; font-size:11.5px; font-weight:600;
  cursor:pointer;
  font-family:inherit;
  user-select:none;
  position:relative; z-index:1;
  transition:color .18s ease;
}
.rt-tabstrip .rt-tab:hover,
.rt-tabstrip .rt-tab.on{ color:#e6e8ee }
.rt-tab-indicator{
  position:absolute;
  bottom:0; left:0;
  height:30px;
  width:0;
  background:rgba(93,173,226,0.14);
  border-bottom:2px solid #5dade2;
  border-radius:4px 4px 0 0;
  /* !important needed: a global * { transition:none!important } reset
     up top kills every transition by default. Same trick on .rt-clip
     and .rt-pane below. */
  transition:transform .1s ease-out, width .1s ease-out !important;
  pointer-events:none;
  z-index:0;
}
/* Sliding clip — same pattern as bestiary monster info: panes are
   absolute-positioned, the active one translated to translateX(0).
   JS keeps the clip's height in sync with the active pane via a
   ResizeObserver so collapse-on-empty / grow-on-resource-add works
   smoothly. */
.rt-clip{
  /* 2026-05-12 grid-overlap layout. See bestiary-monster-info.html
     for full rationale — eliminates JS-driven inline height + the
     ResizeObserver thrash that was causing flicker on every resource
     click. */
  position:relative;
  overflow:hidden;
  width:100%;
  display:grid;
  grid-template-columns:100%;
  contain:layout paint;
}
.rt-pane{
  grid-area:1 / 1;
  width:100%;
  transition:transform .1s ease-out, opacity .1s ease-out !important;
}
/* 2026-05-15 — INACTIVE pane shrinks to height:0 instead of staying
   full-height. CSS grid was sizing the row to max(attr-content,
   res-content) which made the resource tab inherit the attribute
   tab's (taller) height — user reported "资源选项卡高度应该是
   max(资源内容, 窗口高度)，而不是算上属性 tab 高度". `overflow:hidden`
   keeps the slide animation visually contained; `pointer-events:none`
   stops clicks landing on the off-screen pane. The active pane stays
   at natural height so the clip + scroll area size to its content. */
.rt-clip[data-active="attr"] .rt-pane[data-pane="attr"]{ transform:translateX(0); opacity:1 }
.rt-clip[data-active="attr"] .rt-pane[data-pane="res"]{
  transform:translateX(100%); opacity:.4;
  height:0; overflow:hidden; pointer-events:none;
}
.rt-clip[data-active="res"]  .rt-pane[data-pane="attr"]{
  transform:translateX(-100%); opacity:.4;
  height:0; overflow:hidden; pointer-events:none;
}
.rt-clip[data-active="res"]  .rt-pane[data-pane="res"]{  transform:translateX(0); opacity:1 }
</style>
</head>
<body>
<div class="card">
  <div class="root" id="root"></div>
</div>
<script type="module" src="/src/modules/characterCards/info-page.ts"></script>
</body>
</html>

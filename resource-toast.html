<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Resource Toast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  pointer-events:none; /* belt + suspenders alongside disablePointerEvents:true */
}
/* Bottom-center stack — raised so OBR's native bottom action bar
   (~64–80 px tall) stays clear. Each toast lifts on its own
   animation track; the container itself never blocks pointer
   events. */
.stack{
  position:fixed;
  left:50%;
  bottom:96px;       /* 24 → 96 to clear the OBR bottom toolbar */
  transform:translateX(-50%);
  display:flex;flex-wrap:wrap;flex-direction:row-reverse;
  justify-content:center;
  align-items:flex-end;
  gap:10px;
  max-width:calc(100vw - 48px);
}
.toast{
  pointer-events:auto;
  display:flex;flex-direction:column;gap:6px;
  min-width:240px; max-width:380px;
  padding:8px 12px;
  background:rgba(20,24,38,0.92);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:10px;
  box-shadow:0 8px 22px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.4);
  color:#e6e8ee;
  font-size:12px;
  opacity:0;
  transform:translateY(24px);
  transition:opacity .28s ease-out, transform .28s ease-out;
}
.toast.is-in{opacity:1;transform:translateY(0)}
.toast.is-out{opacity:0;transform:translateY(-8px)}
.toast.delta-up{border-color:rgba(46,204,113,0.55);box-shadow:0 8px 22px rgba(46,204,113,0.18)}
.toast.delta-down{border-color:rgba(231,76,60,0.55);box-shadow:0 8px 22px rgba(231,76,60,0.18)}

.toast .head{
  display:flex;align-items:baseline;gap:6px;
  font-size:11.5px;font-weight:700;
  white-space:nowrap;overflow:hidden;
}
.toast .head .name{color:#e6e8ee;flex-shrink:0;text-overflow:ellipsis;overflow:hidden}
.toast .head .who{color:#9aa0b3;font-weight:500;font-size:10.5px;flex-shrink:1;min-width:0;text-overflow:ellipsis;overflow:hidden}
.toast .head .delta{
  margin-left:auto;flex-shrink:0;
  font-size:10.5px;font-weight:800;
  padding:1px 6px;border-radius:4px;
  letter-spacing:0.3px;
  font-family:ui-monospace,Consolas,monospace;
  font-variant-numeric:tabular-nums;
}
.toast.delta-up .head .delta{background:rgba(46,204,113,0.18);color:#7be0a0}
.toast.delta-down .head .delta{background:rgba(231,76,60,0.18);color:#ff8b7a}
.toast.delta-zero .head .delta{display:none}

/* === Replicated widget styles (mirror of panel.ts ensureStyles()).
   The toast renders the SAME HTML as the panel row for that resource
   — count pills, draggable bar, or number bar — so the user gets a
   visual that matches what they just saw. Read-only here: pointer
   events on the body get pointer-events:none below to suppress hover
   highlights and click misfires. */
.toast .widget{pointer-events:none}

.toast .rt-pills{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.toast .rt-pill-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;
}
.toast .rt-pill-icon.full{filter:saturate(1) brightness(1);opacity:1}
.toast .rt-pill-icon.spent{filter:saturate(0.15) brightness(0.55);opacity:0.55}
.toast .rt-pill-icon svg{width:20px;height:20px}

.toast .rt-bar-row{display:flex;align-items:center;gap:6px}
.toast .rt-bar-num{
  flex:0 0 auto;
  font-size:11px;font-weight:700;color:#e6e8ee;
  font-variant-numeric:tabular-nums;
  min-width:42px;text-align:center;
}
.toast .rt-bar{
  flex:1;height:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:10px;position:relative;
}
.toast .rt-bar-fill{
  position:absolute;inset:0 auto 0 0;
  border-radius:10px 0 0 10px;
  background:linear-gradient(90deg, #16a34a, #4ade80);
}
.toast .rt-bar-thumb{
  position:absolute;top:50%;
  width:24px;height:24px;
  transform:translate(-50%, -50%);
  display:inline-flex;align-items:center;justify-content:center;
  background:#1f2230;
  border:2px solid #4ade80;
  border-radius:50%;
  color:#e6e8ee;
}
.toast .rt-bar-thumb svg{width:16px;height:16px}

.toast .rt-num-bar{
  display:grid;
  grid-template-columns:auto auto 1fr auto auto;
  gap:6px;align-items:center;
}
.toast .rt-num-end{
  font-size:10.5px;font-weight:700;color:#9aa0b3;
  font-variant-numeric:tabular-nums;
  padding:2px 4px;
}
.toast .rt-num-step{
  width:22px;height:22px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:5px;
  color:#e6e8ee;font-size:13px;font-weight:800;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.toast .rt-num-orb{
  justify-self:center;
  position:relative;
  width:38px;height:38px;
  display:inline-flex;align-items:center;justify-content:center;
  color:#cbd5e1;
}
.toast .rt-num-orb-icon{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.toast .rt-num-orb-icon svg{width:32px;height:32px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7))}
/* 2026-05-12 — clean stroke for the number-on-icon overlay using
   layered text-shadow (paint-order:stroke fill is unsupported on
   plain HTML span; the 8-direction shadow pattern produces a sharp
   1px outline + soft 4px halo that reads on any icon). */
.toast .rt-num-orb-val{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:ui-monospace,Consolas,monospace;
  font-size:15px;font-weight:900;
  color:#fff;
  text-shadow:
    -1px -1px 0 #000, 1px -1px 0 #000,
    -1px  1px 0 #000, 1px  1px 0 #000,
    -1px  0   0 #000, 1px  0   0 #000,
     0  -1px 0 #000, 0   1px 0 #000,
     0 0 4px rgba(0,0,0,0.95);
  font-variant-numeric:tabular-nums;
}
</style>
</head>
<body>
<div class="stack" id="stack"></div>
<script type="module" src="/src/resource-toast-page.ts"></script>
</body>
</html>
